name: Daily Tip Short (Idea 2)

on:
  schedule:
    # Once per day at 14:00 UTC — adjust to your audience timezone
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Tip niche (English)'
        required: false
        default: 'AI tools and productivity for beginners'
      privacy:
        description: 'YouTube privacy'
        required: false
        default: 'private'
      upload:
        description: 'Upload to YouTube (true/false)'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
  YOUTUBE_TOKEN_PICKLE_B64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_B64 }}
  GEMINI_MODEL: gemini-2.0-flash-lite
  TIP_NICHE: ${{ github.event.inputs.niche || 'AI tools and productivity for beginners' }}
  TIPS_OUTPUT_FOLDER: ./output_reels/tips
  TTS_VOICE: en-US-JennyNeural
  OUTPUT_FOLDER: ./output_reels

jobs:
  daily-tip:
    name: 💡 Daily Tip Short
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          TIP_NICHE=${{ github.event.inputs.niche || 'AI tools and productivity for beginners' }}
          TIPS_OUTPUT_FOLDER=./output_reels/tips
          TTS_VOICE=en-US-JennyNeural
          GEMINI_MODEL=gemini-2.0-flash-lite
          EOF

      - name: Restore YouTube credentials
        if: ${{ github.event.inputs.upload == 'true' || (github.event_name == 'schedule' && secrets.YOUTUBE_TOKEN_PICKLE_B64 != '') }}
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN_PICKLE_B64 }}' | base64 -d > youtube_token.pickle

      - name: Run daily tip pipeline
        run: |
          UPLOAD_FLAG="--no-upload"
          if [ "${{ github.event.inputs.upload }}" = "true" ]; then
            UPLOAD_FLAG="--upload"
          fi
          python main.py daily-tip $UPLOAD_FLAG \
            --niche "${{ github.event.inputs.niche || 'AI tools and productivity for beginners' }}" \
            --privacy "${{ github.event.inputs.privacy || 'private' }}"

      - name: Upload tip artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-tip-${{ github.run_id }}
          path: |
            output_reels/tips/*.mp4
            output_reels/tips/*.json
          retention-days: 7
