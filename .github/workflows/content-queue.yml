name: Content Queue Shorts (2 per day)

on:
  schedule:
    # Two runs per day, 12 hours apart (UTC). Adjust UPLOAD_TIME_1 / _2 in .env to match.
    - cron: '0 9 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      content_file:
        description: 'Path to topics txt (repo-relative)'
        required: false
        default: 'content/video_topics.txt'
      privacy:
        description: 'YouTube privacy'
        required: false
        default: 'private'
      upload:
        description: 'Upload to YouTube (true/false)'
        required: false
        default: 'true'
      topic:
        description: 'Fixed topic (leave empty for random line)'
        required: false
        default: ''

permissions:
  contents: read

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
  YOUTUBE_TOKEN_PICKLE_B64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_B64 }}
  GEMINI_MODEL: gemini-2.0-flash-lite
  CONTENT_QUEUE_FILE: ${{ github.event.inputs.content_file || 'content/video_topics.txt' }}
  QUEUE_OUTPUT_FOLDER: ./output_reels/queue
  TTS_VOICE: en-US-JennyNeural
  OUTPUT_FOLDER: ./output_reels

jobs:
  queue-video:
    name: 🎲 Queue Short
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore topic queue state
        uses: actions/cache@v4
        with:
          path: content/.content_queue_state.json
          key: content-queue-${{ github.ref }}
          restore-keys: |
            content-queue-${{ github.ref }}
            content-queue-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          CONTENT_QUEUE_FILE=${{ github.event.inputs.content_file || 'content/video_topics.txt' }}
          QUEUE_OUTPUT_FOLDER=./output_reels/queue
          TTS_VOICE=en-US-JennyNeural
          GEMINI_MODEL=gemini-2.0-flash-lite
          EOF

      - name: Restore YouTube credentials
        if: ${{ github.event.inputs.upload != 'false' }}
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN_PICKLE_B64 }}' | base64 -d > youtube_token.pickle

      - name: Run queue video pipeline
        env:
          TOPIC: ${{ github.event.inputs.topic }}
          CONTENT_FILE: ${{ github.event.inputs.content_file || 'content/video_topics.txt' }}
          PRIVACY: ${{ github.event.inputs.privacy || 'private' }}
        run: |
          UPLOAD_FLAG="--upload"
          if [ "${{ github.event.inputs.upload }}" = "false" ]; then
            UPLOAD_FLAG="--no-upload"
          fi
          if [ -n "$TOPIC" ]; then
            python main.py queue-video $UPLOAD_FLAG \
              --content-file "$CONTENT_FILE" \
              --privacy "$PRIVACY" \
              --topic "$TOPIC"
          else
            python main.py queue-video $UPLOAD_FLAG \
              --content-file "$CONTENT_FILE" \
              --privacy "$PRIVACY"
          fi

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: queue-short-${{ github.run_id }}
          path: |
            output_reels/queue/*.mp4
            output_reels/queue/*.json
            content/.content_queue_state.json
          retention-days: 14
